<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Screening System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">AI Recruiter</div>
        <div style="color: var(--text-secondary);">Automated Candidate Screening</div>
    </nav>

    <div class="container">
        <!-- Sidebar layout: Create Job / Upload Resume -->
        <div class="sidebar">
            <div class="card" style="margin-bottom: 2rem;">
                <h2>Post a New Job</h2>
                <form id="jobForm">
                    <div class="form-group">
                        <label>Job Title</label>
                        <input type="text" id="jobTitle" required placeholder="e.g. Senior Python Developer">
                    </div>
                    <div class="form-group">
                        <label>Job Description</label>
                        <textarea id="jobDesc" rows="4" required placeholder="Describe the responsibilities..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Required Skills (comma separated)</label>
                        <input type="text" id="jobSkills" placeholder="Python, Django, React">
                    </div>
                    <button type="submit" class="btn">Create Job</button>
                </form>
            </div>

            <div class="card">
                <h2>Upload Resume</h2>
                <form id="resumeForm">
                    <div class="form-group">
                        <label>Select Job Posting</label>
                        <select id="uploadJobId" required>
                            <option value="">-- Loading Jobs --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Candidate Name</label>
                        <input type="text" id="candidateName" required>
                    </div>
                    <div class="file-upload" onclick="document.getElementById('resumeFile').click()">
                        <p>Click or drag to upload PDF</p>
                        <input type="file" id="resumeFile" class="hidden" accept=".pdf,.docx,.txt" required>
                        <p id="fileName" style="margin-top: 10px; color: var(--accent); font-size: 0.9em;"></p>
                    </div>
                    <button type="submit" class="btn">Screen Candidate</button>
                    <p id="uploadStatus" style="margin-top: 10px; font-size: 0.9em; color: var(--text-secondary);"></p>
                </form>
            </div>
        </div>

        <!-- Main Content Area: Dashboard -->
        <div class="main-content">
            <div class="card">
                <h2>Active Job Postings</h2>
                <div class="job-list" id="jobList">
                    <!-- Jobs will be populated here -->
                </div>
            </div>

            <div class="card" style="margin-top: 2rem;" id="candidatesSection">
                <h2>Ranked Candidates <span style="font-size: 0.9rem; font-weight: normal; color: var(--text-secondary);" id="selectedJobTitle"></span></h2>
                <div class="candidate-list" id="candidateList">
                    <p style="color: var(--text-secondary);">Select a job to view ranked candidates.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
